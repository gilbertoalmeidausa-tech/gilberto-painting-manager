[build]
buildCommand = "corepack enable && corepack prepare pnpm@9 --activate && cd .. && pnpm install --frozen-lockfile && pnpm --filter @painting/shared build && pnpm --filter @painting/client build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
